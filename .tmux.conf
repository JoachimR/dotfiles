# make bottom bar transparent
set -g status-style bg=default

# active window: solid background block
setw -g window-status-current-style "fg=black,bg=white,bold"
setw -g window-status-current-format " #I "

# inactive windows: dim grey
setw -g window-status-style "fg=colour245"
setw -g window-status-format " #I "

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# enable mouse
set -g mouse on

# enable copy mode
setw -g mode-keys vi

# ctrl+b ctrl+b to cycle panes, then next window
bind C-b if-shell '[ "$(tmux display-message -p "##{pane_index}")" = "$(tmux list-panes -F "##{pane_index}" | tail -1)" ]' 'select-window -t :+ ; select-pane -t :.1' 'select-pane -t :.+'

# focused pane: catppuccin mocha base, unfocused: mantle (darker)
set -g window-active-style 'bg=#1e1e2e'
set -g window-style 'bg=#181825'

# flash pane on switch (disabled — window-active-style provides focus indication)
# set-hook -g after-select-pane 'select-pane -P bg=colour237 ; run-shell -b "sleep 0.15 ; tmux select-pane -P none"'

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# equalize pane sizes
bind = select-layout even-vertical
bind | select-layout even-horizontal


# fix wrong background color in neovim
set -ga terminal-overrides ",xterm-256color:Tc"

# Set WezTerm window title to current directory
set -g set-titles on
set -g set-titles-string "#{pane_current_path}"



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'


